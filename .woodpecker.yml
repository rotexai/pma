          --digest-file .image-digest-web \
          --build-arg "VITE_API_BASE_URL=https://pma.rotexai.com" \
          --build-arg "VITE_WEB_BASE_URL=https://pma.rotexai.com" \
          --build-arg "VITE_ADMIN_BASE_URL=https://pma.rotexai.com" \
          --build-arg "VITE_ADMIN_BASE_PATH=/god-mode" \
          --build-arg "VITE_SPACE_BASE_URL=https://pma.rotexai.com" \
          --build-arg "VITE_SPACE_BASE_PATH=/spaces" \
          --build-arg "VITE_LIVE_BASE_URL=https://pma.rotexai.com" \
          --build-arg "VITE_LIVE_BASE_PATH=/live" \
          --cache-dir /cache/kaniko/pma-web \
