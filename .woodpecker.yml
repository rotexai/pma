volumes:
  - name: ci-cache
    persistentVolumeClaim:
      claimName: ci-cache

steps:
  - name: verify
    image: node:22-alpine
    environment:
      npm_config_cache: /cache/npm
    volumes:
      - name: ci-cache
        path: /cache
    commands:
      - corepack enable
      - corepack prepare pnpm@latest --activate
      - pnpm install --frozen-lockfile
      - pnpm check
    when:
      event:
        - push
        - pull_request

  - name: publish-api
    image: gcr.io/kaniko-project/executor:debug
    volumes:
      - name: ci-cache
        path: /cache
    entrypoint:
      - /busybox/sh
      - -c
      - |
        set -euo pipefail
        : "$${REGISTRY_ENDPOINT:?REGISTRY_ENDPOINT is not set}"

        workspace_dir="$${CI_WORKSPACE:-$(pwd)}"
        dockerfile="$workspace_dir/apps/api/Dockerfile.api"
        if [ ! -f "$dockerfile" ]; then
          echo "Dockerfile not found at $dockerfile" >&2
          exit 1
        fi

        mkdir -p /cache/kaniko/pma-api

        /kaniko/executor \
          --context "dir://$workspace_dir/apps/api" \
          --dockerfile "$dockerfile" \
          --destination "$REGISTRY_ENDPOINT/pma-api:$CI_COMMIT_SHA" \
          --digest-file .image-digest-api \
          --cache-dir /cache/kaniko/pma-api \
          --cache=true \
          --cache-repo "$REGISTRY_ENDPOINT/cache/pma-api" \
          --cache-ttl=168h \
          --push-retry=3 \
          --image-download-retry=3 \
          --cleanup \
          --insecure
    depends_on:
      - verify
    when:
      branch: main
      event:
        - push

