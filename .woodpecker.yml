  - name: update-manifest
    image: alpine/git:2.49.1
    depends_on:
      - publish-api
      - publish-web
      - publish-admin
      - publish-space
      - publish-live
    environment:
      GITOPS_TOKEN:
        from_secret: GITOPS_TOKEN
    commands:
      - |
        set -eu
        : "$${GITOPS_TOKEN:?GITOPS_TOKEN is not set}"

        workspace_dir="$(pwd)"
        workdir="$(mktemp -d)"
        trap 'rm -rf "$workdir"' EXIT

        git clone \
          "https://x-access-token:$${GITOPS_TOKEN}@github.com/rotexai/manifest.git" \
          "$workdir/manifest"
        cd "$workdir/manifest"

        git config user.name "woodpecker"
        git config user.email "woodpecker@rotexai.com"

        set_image_digest() {
          file="$1"
          image_name="$2"
          digest="$3"
          tmp="$(mktemp)"
          awk -v image_name="$image_name" -v digest="$digest" '
            {
              line = $0
              match(line, /^[[:space:]]*/)
              indent = substr(line, RSTART, RLENGTH)
              stripped = substr(line, RLENGTH + 1)

              if (in_target && length(indent) <= target_indent && stripped !~ /^$/) {
                in_target = 0
              }

              if (stripped ~ /^- name:[[:space:]]*/) {
                entry_name = stripped
                sub(/^- name:[[:space:]]*/, "", entry_name)
                if (entry_name == image_name) {
                  in_target = 1
                  target_indent = length(indent)
                  found_target = 1
                  seen_digest = 0
                }
              }

              if (in_target && stripped ~ /^digest:/) {
                if (!seen_digest) {
                  print indent "digest: " digest
                  seen_digest = 1
                }
                next
              }

              print line

              if (in_target && stripped ~ /^newName:/ && !seen_digest) {
                print indent "digest: " digest
                seen_digest = 1
              }
            }
            END {
              if (!found_target || !seen_digest) {
                exit 1
              }
            }
          ' "$file" > "$tmp" && mv "$tmp" "$file"
        }

        manifest_file="./clusters/rum/pma/kustomization.yaml"
        if [ ! -f "$manifest_file" ]; then
          echo "Could not find pma kustomization in manifest repo" >&2
          exit 1
        fi

        images="api web admin space live"
        for img in $images; do
          digest_file="$workspace_dir/.image-digest-$img"
          if [ ! -f "$digest_file" ]; then
            echo "Image digest file for pma-$img not found" >&2
            exit 1
          fi
          digest="$(tr -d '\r\n' < "$digest_file")"
          if [ -z "$digest" ]; then
            echo "Image digest for pma-$img is empty" >&2
            exit 1
          fi
          set_image_digest "$manifest_file" "pma-$img" "$digest"
        done

        if git diff --quiet -- "$manifest_file"; then
          echo "Manifest already up to date; nothing to push."
          exit 0
        fi

        git add "$manifest_file"
        git commit -m "chore(pma): promote images to $(echo $CI_COMMIT_SHA | head -c 8)"
        git push origin main
    when:
      branch: main
      event:
        - push
